        title: Adaptive AI Interviewer
        additional_links:
          - title: GitHub
            icon: fab fa-github
            url: https://github.com  # Update with actual repo URL
        quote: >
          An end-to-end AI-powered technical interview platform with adaptive question selection, voice orchestration, and real-time code evaluation.
        description: |
          - Implemented secure authentication and session management (signup, login, 2FA, password reset) using **Clerk**, enabling role-based interviewer/interviewee flows and robust token handling for live interview sessions.
          - Developed an intelligent interview generation engine that automates structured candidate evaluation using **semantic embeddings** to match job descriptions to a tagged question bank, dynamically filtered by seniority-level difficulty.
          - Built a Codeforces problem ingestion pipeline that scrapes, enriches, and stores 1,300+ problems with LLM-generated solutions and hidden test cases, evaluates submissions via a **self-hosted Piston sandbox**, and surfaces real-time runtime metrics.
          - Designed adaptive interview orchestration: embedding-based question matching, **ElevenLabs TTS**-based spoken interview orchestration, per-question response storage, and a multi-dimensional scoring pipeline (correctness + communication quality) driving explainable, real-time next-question selection.

          **Tech Stack:** React, Node.js, MongoDB, Clerk, ElevenLabs, Piston

      - layout: left
        border: weak
        title: FedPACE
        link: https://github.com  # Update with actual GitHub repo URL
        link_text: View on GitHub
        additional_links:
          - title: GitHub
            icon: fab fa-github
            url: https://github.com  # Update with actual repo URL
        quote: >
          A federated learning framework improving global accuracy and domain generalization via a three-stage aggregation pipeline.
        description: |
          - Increased CIFAR-10 global accuracy by **+2.5%** over the Fed-GGA baseline by designing a three-stage federated pipeline (annealing → sign-agreement dampening → sign-disagreement pruning) and running seed-averaged experiments to validate robustness across heterogeneous client data distributions.
          - Improved domain generalization on **PACS by +3.89%** by integrating sign-agreement weighting and late-stage pruning to filter spurious client parameters and extract invariant features.
          - Improved training stability through systematic ablations and hyperparameter sweeps (K, β, pruning threshold), synthesizing practical schedules used for full experiments.

          **Tech Stack:** Python, PyTorch, NumPy, Matplotlib, Pandas

      - layout: left
        border: weak
        title: Strategic LLM Alignment
        additional_links:
          - title: GitHub
            icon: fab fa-github
            url: https://github.com  # Update with actual repo URL
        quote: >
          Research into decoding strategies and preference alignment for large language models using DPO and PEFT/LoRA.
        description: |
          - Identified that **Top-P (nucleus) sampling** yields a superior reward–diversity frontier by implementing a decoding suite (Greedy, Beam, Top-K, Top-P) and measuring Distinct-N/reward metrics across temperature sweeps.
          - Implemented **Direct Preference Optimization (DPO)** with PEFT/LoRA (rank=8, α=16), achieving low mean token KL (≈ 0.016) while preserving perplexity (≈ 11) and evaluating robustness under adversarial perturbations.
          - Enabled resource-efficient DPO training on constrained GPUs by integrating **8-bit model loading** with LoRA adapters, reducing VRAM needs and allowing broader hyperparameter exploration.

          **Tech Stack:** Python, PyTorch, NumPy, Matplotlib, PEFT/LoRA

